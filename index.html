<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#b5603a">
    <title>Sistema de Estoque | Cuor di Crema & Johnny Rockets</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        :root { --terra: #b5603a; --tl: #f5ede7; --tm: #e8c9b8; --cream: #f5efe6; --white: #fff; --border: #e8ddd4; --text: #2a1f1a; --t3: #b09a8c; --r: 12px; }
        body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 480px; height: 100%; background: var(--cream); display: flex; flex-direction: column; position: relative; }
        header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--tm); }
        .logo { font-family: 'Playfair Display'; font-weight: 700; color: var(--terra); font-size: 20px; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .inventory-item { background: white; border: 1px solid var(--border); border-radius: var(--r); padding: 15px; margin-bottom: 10px; }
        .qty-control { display: flex; align-items: center; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .btn-qty { width: 50px; height: 45px; border: none; background: #fdf8f3; color: var(--terra); font-size: 20px; font-weight: 700; }
        .qty-input { flex: 1; height: 45px; border: none; text-align: center; font-weight: 800; font-size: 18px; width: 60px; }
        nav { position: absolute; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0; border-top: 2px solid var(--tm); }
        .nav-item { border: none; background: none; color: var(--t3); flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: var(--terra); }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2a1f1a; color: white; padding: 10px 20px; border-radius: 20px; transition: 0.3s; z-index: 100; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div id="app">
    <header><div class="logo">ESTOQUE</div><div style="font-size:11px; font-weight:800; color:var(--terra)">SHOPPING</div></header>
    <main>
        <section id="home" class="page active">
            <div style="background:var(--terra); color:white; padding:20px; border-radius:12px;"><h2>Olá, Cleomar</h2><p>Boa contagem hoje!</p></div>
        </section>
        <section id="list" class="page">
            <div class="inventory-item">
                <div style="font-weight:700">Gelato Vanilla (5L)</div>
                <div class="qty-control">
                    <button class="btn-qty" onclick="updateQty(this, -1)">-</button>
                    <input type="number" class="qty-input" value="0">
                    <button class="btn-qty" onclick="updateQty(this, 1)">+</button>
                </div>
            </div>
            <div class="inventory-item">
                <div style="font-weight:700">Pão de Brioche (JR)</div>
                <div class="qty-control">
                    <button class="btn-qty" onclick="updateQty(this, -1)">-</button>
                    <input type="number" class="qty-input" value="0">
                    <button class="btn-qty" onclick="updateQty(this, 1)">+</button>
                </div>
            </div>
        </section>
    </main>
    <nav>
        <button class="nav-item active" onclick="switchPage(this, 'home')"><i class="fa-solid fa-house"></i><span>Home</span></button>
        <button class="nav-item" onclick="switchPage(this, 'list')"><i class="fa-solid fa-list"></i><span>Itens</span></button>
    </nav>
    <div id="toast">Salvo!</div>
</div>
<script>
    function switchPage(btn, id) {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
    }
    function updateQty(btn, amt) {
        const input = btn.parentElement.querySelector('input');
        input.value = Math.max(0, parseInt(input.value) + amt);
        showToast("Valor alterado!");
    }
    function showToast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
</script>
</body>
</html>
